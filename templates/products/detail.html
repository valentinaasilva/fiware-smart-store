{% extends 'base.html' %}

{% block content %}
<h2>{{ _('Product Detail') }}</h2>
<dl>
  <dt>{{ _('ID') }}</dt><dd>{{ product.id }}</dd>
  <dt>{{ _('Name') }}</dt><dd>{{ product.name }}</dd>
  <dt>{{ _('Price') }}</dt><dd>{{ product.price }}</dd>
  <dt>{{ _('Type') }}</dt><dd>{{ product.type }}</dd>
</dl>
{% endblock %}
