{% extends 'base.html' %}

{% block content %}
<h2>{{ _('Products') }}</h2>
<table>
  <thead>
    <tr><th>{{ _('ID') }}</th><th>{{ _('Name') }}</th><th>{{ _('Price') }}</th></tr>
  </thead>
  <tbody>
  {% for product in products %}
    <tr>
      <td>{{ product.id }}</td>
      <td><a href="{{ url_for('products.get_product', entity_id=product.id) }}">{{ product.name }}</a></td>
      <td>{{ product.price }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
