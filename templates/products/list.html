{% extends 'base.html' %}

{% block content %}
<h2>Products</h2>
<table>
  <thead>
    <tr><th>ID</th><th>Name</th><th>Price</th></tr>
  </thead>
  <tbody>
  {% for product in products %}
    <tr>
      <td>{{ product.id }}</td>
      <td><a href="{{ url_for('products.get_product', entity_id=product.id) }}">{{ product.name }}</a></td>
      <td>{{ product.price }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
