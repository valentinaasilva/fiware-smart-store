<!doctype html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fiware-smart-store</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>
<body>
  <header class="topbar">
    <div class="brand-block">
      <p class="brand-kicker">Smart Retail Operations</p>
      <h1>fiware-smart-store</h1>
    </div>
    <nav class="main-nav">
      <a href="{{ url_for('dashboard') }}" class="{% if request.path == '/' %}active{% endif %}">{{ _('Dashboard') }}</a>
      <a href="{{ url_for('stores.list_stores') }}" class="{% if request.path.startswith('/stores') %}active{% endif %}">{{ _('Stores') }}</a>
      <a href="{{ url_for('products.list_products') }}" class="{% if request.path.startswith('/products') %}active{% endif %}">{{ _('Products') }}</a>
      <a href="{{ url_for('employees.list_employees') }}" class="{% if request.path.startswith('/employees') %}active{% endif %}">{{ _('Employees') }}</a>
    </nav>
    <div class="lang-switcher">
      <span class="lang-label">{{ _('Language') }}:</span>
      <a class="lang-link{% if current_lang == 'es' %} active{% endif %}" href="{{ url_for('set_language', lang='es', next=request.path) }}">ES</a>
      <a class="lang-link{% if current_lang == 'en' %} active{% endif %}" href="{{ url_for('set_language', lang='en', next=request.path) }}">EN</a>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
