<!doctype html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fiware-smart-store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand-link" href="{{ url_for('dashboard') }}">
        <span class="brand-logo" aria-hidden="true">❦</span>
        <span class="brand-name">Xantadis</span>
      </a>
      <p class="brand-signature">fiware-smart-store</p>

      <nav class="sidebar-nav">
        <a href="{{ url_for('dashboard') }}" class="{% if request.path == '/' %}active{% endif %}">
          <i class="fa-solid fa-gauge-high nav-icon" aria-hidden="true"></i>{{ _('Dashboard') }}
        </a>
        <a href="{{ url_for('products.list_products') }}" class="{% if request.path.startswith('/products') %}active{% endif %}">
          <i class="fa-solid fa-boxes-stacked nav-icon" aria-hidden="true"></i>{{ _('Products') }}
        </a>
          <a href="{{ url_for('stores.list_stores') }}" class="{% if request.path == '/stores' or request.path.startswith('/stores/') %}active{% endif %}">
          <i class="fa-solid fa-store nav-icon" aria-hidden="true"></i>{{ _('Stores') }}
        </a>
        <a href="{{ url_for('employees.list_employees') }}" class="{% if request.path.startswith('/employees') %}active{% endif %}">
          <i class="fa-solid fa-people-group nav-icon" aria-hidden="true"></i>{{ _('Employees') }}
        </a>
        <a href="{{ url_for('stores_map') }}" class="{% if request.path == '/stores-map' %}active{% endif %}">
          <i class="fa-solid fa-map-location-dot nav-icon" aria-hidden="true"></i>{{ _('Stores Map') }}
        </a>
      </nav>

      <div class="sidebar-footer">
        <p class="lang-heading">{{ _('Language') }}</p>
        <a href="{{ url_for('set_language', lang='es', next=request.path) }}" class="lang-mini{% if current_lang == 'es' %} active{% endif %}">ES</a>
        <span>|</span>
        <a href="{{ url_for('set_language', lang='en', next=request.path) }}" class="lang-mini{% if current_lang == 'en' %} active{% endif %}">EN</a>
      </div>
    </aside>

    <div class="main-shell">
      <div class="support-strip">
        <p><span aria-hidden="true">☎</span> {{ _('Customer Support') }}: 900 123 456</p>
        <p><span aria-hidden="true">✉</span> atencion@xantadis.es</p>
      </div>

      <header class="top-header">
        <form class="search-wrap" method="get" action="{{ url_for('products.list_products') }}">
          <span aria-hidden="true">⌕</span>
          <input type="search" name="q" value="{{ request.args.get('q', '') }}" placeholder="{{ _('Search products, stores...') }}">
          <button type="submit" class="search-submit">{{ _('Search') }}</button>
        </form>

        <div class="header-actions">
          <label for="theme-mode" class="theme-label">{{ _('Theme') }}</label>
          <select id="theme-mode" class="theme-toggle" data-system="{{ _('System') }}" data-light="{{ _('Light Mode') }}" data-dark="{{ _('Dark Mode') }}">
            <option value="system">{{ _('System') }}</option>
            <option value="light">{{ _('Light Mode') }}</option>
            <option value="dark">{{ _('Dark Mode') }}</option>
          </select>
        </div>
      </header>

      <main class="content-shell">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="{{ url_for('static', filename='vendor/three.min.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <!-- Socket.IO client library (compatible with Flask-SocketIO 5 / Engine.IO 4) -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <!-- Image Fallback Handler -->
  <script src="{{ url_for('static', filename='js/image-fallback.js') }}"></script>
  <!-- Custom SocketIO notification handler -->
  <script src="{{ url_for('static', filename='js/socketio-client.js') }}"></script>
  <script src="{{ url_for('static', filename='js/product-inventory.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
