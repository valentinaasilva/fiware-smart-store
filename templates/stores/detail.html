{% extends 'base.html' %}

{% block content %}
<h2>{{ _('Store Detail') }}</h2>
<dl>
  <dt>{{ _('ID') }}</dt><dd>{{ store.id }}</dd>
  <dt>{{ _('Name') }}</dt><dd>{{ store.name }}</dd>
  <dt>{{ _('Country') }}</dt><dd>{{ store.countryCode }}</dd>
  <dt>{{ _('Type') }}</dt><dd>{{ store.type }}</dd>
</dl>
{% endblock %}
