{% extends 'base.html' %}

{% block content %}
<h2>{{ _('Employees') }}</h2>
<table>
  <thead>
    <tr><th>{{ _('ID') }}</th><th>{{ _('Name') }}</th><th>{{ _('Category') }}</th></tr>
  </thead>
  <tbody>
  {% for employee in employees %}
    <tr>
      <td>{{ employee.id }}</td>
      <td><a href="{{ url_for('employees.get_employee', entity_id=employee.id) }}">{{ employee.name }}</a></td>
      <td>{{ employee.category }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
